# Clicked OSC-8 file:// hyperlinks open in an overlay nvim on top of the
# current pane. Requires the emitting tool to produce OSC-8 links, e.g.
# `rg --hyperlink-format=kitty`, `eza --hyperlink`, `fd --hyperlink`.

# With a numeric #fragment → open at that line.
protocol file
fragment_matches ^[0-9]+$
action launch --type=os-window --cwd=current nvim +${FRAGMENT} ${FILE_PATH}

# No fragment (or non-numeric) → just open the file.
protocol file
action launch --type=os-window --cwd=current nvim ${FILE_PATH}
