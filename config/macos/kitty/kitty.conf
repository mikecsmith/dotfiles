# Remote config for nvim
allow_remote_control socket-only
listen_on unix:/tmp/mykitty

macos_option_as_alt yes
macos_quit_when_last_window_closed yes

# Font settings
font_family MesloLGS NF
font_size 13.0

# Scrollback
scrollback_lines 50000

# UX
copy_on_select clipboard
confirm_os_window_close 1

# Notify on long-running command completion (requires shell integration, default on).
notify_on_cmd_finish unfocused 10.0

# Window
window_padding_width 0
window_padding_height 0
hide_window_decorations no

# Tab bar
tab_bar_style powerline
tab_bar_min_tabs_width 48
tab_bar_edge top

# Unmap so it passes through to neovim for move line up
map cmd+opt+k

# Layout — splits for nvim + Claude pane + optional bottom runner; stack for zoom via cmd+z.
enabled_layouts splits,stack

# Hints: match file:line and open the file in a new kitty OS window running nvim.
map ctrl+f kitten hints --type=linenum --linenum-action=background kitten @ launch --type=os-window --cwd=current nvim +{line} {path}

# Shell-integration: jump between prompts in scrollback, show last command output.
map cmd+up scroll_to_prompt -1
map cmd+down scroll_to_prompt 1
map cmd+shift+o show_last_command_output

# Key bindings
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+u char_select
map cmd+f search
map cmd+k clear_scrollback
map cmd+n new_window
map cmd+q close_window
map cmd+r reload_config
map cmd+t new_tab
map cmd+w close_tab
map cmd+z toggle_layout stack

# Pane navigation
map opt+h kitten pass_keys.py neighboring_window left opt+h
map opt+j kitten pass_keys.py neighboring_window bottom opt+j
map opt+k kitten pass_keys.py neighboring_window top opt+k
map opt+l kitten pass_keys.py neighboring_window right opt+l

# Pane resizing
map ctrl+h resize_window narrower 
map ctrl+j resize_window taller 
map ctrl+k resize_window shorter 
map ctrl+l resize_window wider 

# Splitting panes
map opt+\ launch --location=vsplit --cwd=current
map opt+- launch --location=hsplit --cwd=current

# On-demand bottom runner pane (~25% height) for tilt/logs/ad-hoc processes
map opt+t launch --location=hsplit --bias=25 --cwd=current

# Tab navigation
map ctrl+page_up previous_tab
map ctrl+page_down next_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab -1

# Includes
include tokyo-night.conf
